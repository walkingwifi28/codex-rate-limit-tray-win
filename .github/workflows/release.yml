name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Test
        run: dotnet test CodexRateLimitTray.sln --configuration Release

      - name: Publish
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          dotnet publish src/CodexRateLimitTray/CodexRateLimitTray.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$version `
            --output artifacts/publish/win-x64

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $env:APP_VERSION = "${{ github.ref_name }}".TrimStart("v")
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\CodexRateLimitTray.iss

      - name: Check SignPath configuration
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:SIGNPATH_API_TOKEN)) { $missing += "SIGNPATH_API_TOKEN secret" }
          if ([string]::IsNullOrWhiteSpace($env:SIGNPATH_ORGANIZATION_ID)) { $missing += "SIGNPATH_ORGANIZATION_ID variable" }
          if ([string]::IsNullOrWhiteSpace($env:SIGNPATH_PROJECT_SLUG)) { $missing += "SIGNPATH_PROJECT_SLUG variable" }
          if ([string]::IsNullOrWhiteSpace($env:SIGNPATH_SIGNING_POLICY_SLUG)) { $missing += "SIGNPATH_SIGNING_POLICY_SLUG variable" }
          if ([string]::IsNullOrWhiteSpace($env:SIGNPATH_ARTIFACT_CONFIGURATION_SLUG)) { $missing += "SIGNPATH_ARTIFACT_CONFIGURATION_SLUG variable" }

          if ($missing.Count -gt 0) {
            throw "SignPath is not configured. Missing: $($missing -join ', '). This workflow only publishes SignPath-signed releases."
          }

      - name: Upload unsigned installer for SignPath
        id: upload-unsigned-installer
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: installer/Output/*.exe
          if-no-files-found: error

      - name: Sign installer with SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: installer/SignedOutput

      - name: Verify signed installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem installer\SignedOutput\*.exe | Select-Object -First 1
          if ($null -eq $installer) {
            throw "Signed installer was not found."
          }

          $signature = Get-AuthenticodeSignature $installer.FullName
          $signature | Format-List

          if ($signature.Status -ne "Valid") {
            throw "Signed installer does not have a valid Authenticode signature. Status: $($signature.Status)"
          }

      - name: Checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem installer\SignedOutput\*.exe | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToUpperInvariant()
          "$hash  $($installer.Name)" | Set-Content -NoNewline -Encoding ascii "$($installer.FullName).sha256"
          "INSTALLER=$($installer.FullName)" >> $env:GITHUB_ENV
          "CHECKSUM=$($installer.FullName).sha256" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.INSTALLER }}
            ${{ env.CHECKSUM }}
